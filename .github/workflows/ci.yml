name: CI - PostgreSQL Extension Testing

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    name: PG ${{ matrix.pg_version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        # Test only officially supported PostgreSQL versions (12-17)
        pg_version: ['12', '13', '14', '15', '16', '17']
        os: ['ubuntu-22.04', 'ubuntu-24.04']
        exclude:
          # PG 17 not available on Ubuntu 22.04 yet
          - pg_version: '17'
            os: 'ubuntu-22.04'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install PostgreSQL ${{ matrix.pg_version }}
        run: |
          sudo apt-get update
          # Add PostgreSQL APT repository
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y \
            postgresql-${{ matrix.pg_version }} \
            postgresql-server-dev-${{ matrix.pg_version }} \
            postgresql-contrib-${{ matrix.pg_version }}
      
      - name: Build extension with strict flags
        run: |
          export PG_CONFIG=/usr/lib/postgresql/${{ matrix.pg_version }}/bin/pg_config
          make clean
          # Build with -Werror to catch all warnings
          make PG_CPPFLAGS="-Wall -Wextra -Werror -Wformat-security -D_FORTIFY_SOURCE=2"
      
      - name: Check for unsafe functions
        run: |
          # Fail if code contains known unsafe functions (except in controlled contexts)
          ! grep -n "strcpy\|strcat\|sprintf\|gets" efm_extension.c || \
            (echo "ERROR: Unsafe string functions found" && exit 1)
      
      - name: Install extension
        run: |
          export PG_CONFIG=/usr/lib/postgresql/${{ matrix.pg_version }}/bin/pg_config
          sudo make install
      
      - name: Start PostgreSQL
        run: |
          sudo systemctl start postgresql@${{ matrix.pg_version }}-main
          sudo -u postgres createuser -s $USER || true
      
      - name: Run regression tests
        run: |
          export PG_CONFIG=/usr/lib/postgresql/${{ matrix.pg_version }}/bin/pg_config
          make installcheck || (cat regression.diffs && exit 1)
      
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-results-pg${{ matrix.pg_version }}-${{ matrix.os }}
          path: |
            regression.diffs
            regression.out
            results/

  security-scan:
    name: Security Analysis
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install PostgreSQL (latest)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-16 postgresql-server-dev-16
      
      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: c
      
      - name: Build for CodeQL
        run: |
          export PG_CONFIG=/usr/lib/postgresql/16/bin/pg_config
          make clean
          make
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
      
      - name: Check for hardcoded secrets
        run: |
          # Fail if potential secrets found in code
          ! grep -rn "password.*=.*['\"]" --include="*.c" --include="*.sql" . || \
            (echo "WARNING: Potential hardcoded secrets found" && exit 0)
      
      - name: Verify version guards
        run: |
          # Ensure PG_VERSION_NUM guard exists
          grep -q "PG_VERSION_NUM < 120000" efm_extension.c || \
            (echo "ERROR: Missing PostgreSQL version guard" && exit 1)

  lint:
    name: Code Quality Checks
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-server-dev-16 cppcheck
      
      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,style,performance,portability \
            --error-exitcode=1 \
            --suppress=variableScope \
            --suppress=unusedFunction \
            -I /usr/include/postgresql/16/server \
            efm_extension.c
      
      - name: Check code formatting
        run: |
          # Verify no trailing whitespace
          ! grep -rn "[[:space:]]$" --include="*.c" --include="*.h" . || \
            (echo "WARNING: Trailing whitespace found" && exit 0)
      
      - name: Verify documentation
        run: |
          # Ensure key documentation files exist
          test -f docs/compatibility.md || (echo "ERROR: Missing compatibility.md" && exit 1)
          test -f docs/security_review.md || (echo "ERROR: Missing security_review.md" && exit 1)
          test -f README.md || (echo "ERROR: Missing README.md" && exit 1)

  compatibility-matrix:
    name: Full Compatibility Matrix
    runs-on: ubuntu-24.04
    needs: [test, security-scan, lint]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Compatibility Summary
        run: |
          echo "✅ All tests passed across PostgreSQL 12-17"
          echo "✅ Security scans completed"
          echo "✅ Code quality checks passed"
          echo ""
          echo "Supported PostgreSQL versions: 12, 13, 14, 15, 16, 17"
          echo "Supported EFM versions: 4.x, 5.x"
          echo "Tested platforms: Ubuntu 22.04, 24.04"
