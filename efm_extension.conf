# efm_extension.conf
# Sample configuration for regression testing
#
# Copy this to postgresql.conf or include it via:
#   include 'efm_extension.conf'
#
# For production use, set these values via ALTER SYSTEM:
#   ALTER SYSTEM SET efm.cluster_name TO 'mycluster';
#   SELECT pg_reload_conf();

# Required: Load extension for background worker and caching support
# shared_preload_libraries = 'efm_extension'

# EFM Cluster Configuration
# -------------------------

# Name of the EFM cluster to manage (required)
efm.cluster_name = 'efm'

# Full path to the EFM binary (required)
efm.command_path = '/usr/edb/efm-4.9/bin/efm'

# Path to sudo binary (default: /usr/bin/sudo)
efm.sudo_path = '/usr/bin/sudo'

# User to run EFM commands as (default: efm)
efm.sudo_user = 'efm'

# Directory containing EFM properties files
efm.properties_location = '/etc/edb/efm-4.9'

# Cache Configuration
# -------------------

# Cache TTL in seconds (0 = disabled, default: 5)
# Higher values reduce EFM command calls but may show stale data
efm.cache_ttl = 5

# Background Worker Configuration
# -------------------------------
# Note: Requires shared_preload_libraries to be effective

# Enable background worker for periodic status polling (default: false)
efm.bgw_enabled = false

# Polling interval in seconds (default: 10)
efm.bgw_interval = 10

# Database for background worker to connect to (default: postgres)
efm.bgw_database = 'postgres'

# Persist status history to table (default: false)
# When enabled, status is written to efm_extension.efm_status_history
efm.bgw_persist_history = false
