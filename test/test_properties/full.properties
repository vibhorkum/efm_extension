# Full EFM properties file for testing
# All common properties with various types

# Database connection
db.user=efm
db.password.encrypted=074b627bf50168881d246c5dd32fd8d0
db.port=5444
db.database=edb
db.service.owner=enterprisedb
db.service.name=edb-as-16
db.bin=/usr/edb/as16/bin
db.recovery.conf.dir=/pgdata
db.reuse.connection.count=10

# JDBC/SSL
jdbc.ssl=true
jdbc.ssl.mode=verify-ca

# Network
bind.address=172.17.0.2:5430
admin.port=5431

# Monitoring/Timeouts
local.period=10
local.timeout=60
local.timeout.final=10
remote.timeout=10
node.timeout=50

# Network testing
pingServerIp=8.8.8.8,1.1.1.1
pingServerCommand=/bin/ping -q -c3 -w5

# Failover behavior
auto.allow.hosts=true
auto.failover=true
auto.reconfigure=true
promotable=true
minimum.standbys=0
recovery.check.period=2
auto.resume.period=0

# Node management
is.witness=false

# Virtual IP
virtualIp=192.168.1.100
virtualIp.interface=eth0
virtualIp.netmask=255.255.255.0

# Scripts/Hooks
script.notification=/opt/efm/notify.sh
script.fence=/opt/efm/fence.sh
script.post.promotion=/opt/efm/post_promote.sh

# System commands
sudo.command=sudo
sudo.user.command=sudo -u %u

# Logging
jgroups.loglevel=INFO
efm.loglevel=INFO

# JVM
jvm.options=-Xmx32m -Dfoo=bar

# Licensing
efm.license=

# Email
user.email=admin@example.com
