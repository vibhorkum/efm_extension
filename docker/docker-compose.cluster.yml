# docker-compose.cluster.yml - Multi-node PostgreSQL + EFM cluster
#
# This creates a full PostgreSQL streaming replication cluster with EFM:
#   - 1 Primary node
#   - 1 Standby node
#   - EFM managing failover on all nodes
#
# Usage:
#   # Set your EDB subscription token
#   export EDB_SUBSCRIPTION_TOKEN=your_token_here
#
#   # Build the cluster image
#   docker-compose -f docker/docker-compose.cluster.yml build
#
#   # Start the cluster
#   docker-compose -f docker/docker-compose.cluster.yml up -d
#
#   # Check cluster status
#   docker-compose -f docker/docker-compose.cluster.yml exec primary \
#       sudo -u efm /usr/edb/efm-4.9/bin/efm cluster-status efm
#
#   # Run tests
#   docker-compose -f docker/docker-compose.cluster.yml exec primary /tests/run_all_tests.sh
#
#   # Stop the cluster
#   docker-compose -f docker/docker-compose.cluster.yml down -v

services:
  primary:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cluster
      args:
        EDB_SUBSCRIPTION_TOKEN: ${EDB_SUBSCRIPTION_TOKEN:?EDB_SUBSCRIPTION_TOKEN is required}
        PG_VERSION: "${PG_VERSION:-16}"
        EFM_VERSION: "${EFM_VERSION:-4.9}"
    container_name: efm_primary
    hostname: efm-primary
    environment:
      NODE_ROLE: primary
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testdb
      EFM_CLUSTER_NAME: efm
      EFM_DB_PASSWORD: efm_pass
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator_pass
      STANDBY_HOSTS: efm-standby1
    ports:
      - "5500:5432"
      - "7800:7800"
      - "7809:7809"
    volumes:
      - primary_data:/var/lib/postgresql/data
      - ./tests:/tests:ro
    networks:
      efm_cluster:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  standby1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cluster
      args:
        EDB_SUBSCRIPTION_TOKEN: ${EDB_SUBSCRIPTION_TOKEN:?EDB_SUBSCRIPTION_TOKEN is required}
        PG_VERSION: "${PG_VERSION:-16}"
        EFM_VERSION: "${EFM_VERSION:-4.9}"
    container_name: efm_standby1
    hostname: efm-standby1
    environment:
      NODE_ROLE: standby
      PRIMARY_HOST: efm-primary
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testdb
      EFM_CLUSTER_NAME: efm
      EFM_DB_PASSWORD: efm_pass
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator_pass
    ports:
      - "5501:5432"
      - "7801:7800"
      - "7810:7809"
    volumes:
      - standby1_data:/var/lib/postgresql/data
      - ./tests:/tests:ro
    networks:
      efm_cluster:
        ipv4_address: 172.28.0.11
    depends_on:
      primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  primary_data:
  standby1_data:

networks:
  efm_cluster:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
